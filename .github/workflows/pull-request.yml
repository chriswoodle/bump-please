name: Pull Request

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: yarn build
      - run: yarn build:action
      - run: yarn test

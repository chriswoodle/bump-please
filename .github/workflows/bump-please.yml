name: Version Bump

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: 🏗 Setup repo
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: 📦 Enable Corepack
      run: corepack enable

    - name: 🏗 Setup Node
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: 24
        cache: yarn

    - name: 📦 Install Project dependencies
      run: yarn install --immutable

    - name: 🏗️ Build packages
      run: yarn build

    - name: 🏗️ Build action
      run: yarn build:action

    - name: 🏗️ Test packages
      run: yarn test

  bump:
    needs: build-and-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: 🏗 Setup repo
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: 📦 Enable Corepack
      run: corepack enable

    - name: 🏗 Setup Node
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: 24
        cache: yarn

    - name: 📦 Install Project dependencies
      run: yarn install --immutable

    - name: 🏗️ Build packages
      run: yarn build

    - name: 🏗️ Build action
      run: yarn build:action

    - name: 🤜 Bump Please
      uses: ./action
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: build-and-test
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
    - name: 🏗 Setup repo
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

    - name: 📦 Enable Corepack
      run: corepack enable

    - name: 🏗 Setup Node
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: 24
        cache: yarn

    - name: 📦 Install Project dependencies
      run: yarn install --immutable

    - name: 🏗️ Build packages
      run: yarn build

    - name: 🏗️ Build action
      run: yarn build:action

    - name: 📦 Publish bump-please-core
      run: cd bump-please-core && yarn npm publish --access public

    - name: 📦 Publish bump-please
      run: cd bump-please && yarn npm publish --access public

  publish-action:
    needs: build-and-test
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: 🏗 Setup repo
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

    - name: 📦 Enable Corepack
      run: corepack enable

    - name: 🏗 Setup Node
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: 24
        cache: yarn

    - name: 📦 Install Project dependencies
      run: yarn install --immutable

    - name: 🏗️ Build packages
      run: yarn build

    - name: 🏗️ Build action
      run: yarn build:action

    - name: 📦 Push action to bump-please-action repo
      env:
        GITHUB_TOKEN: ${{ secrets.ACTION_REPO_TOKEN }}
      run: |
        # Extract version and major tag from the release (e.g. v1.5.0 -> v1)
        VERSION="${GITHUB_REF_NAME}"
        MAJOR="$(echo "$VERSION" | grep -oP '^v\d+')"

        # Configure git to inject the token via credential helper (never written to disk)
        TEMP_DIR="$(mktemp -d)"
        git init -b main "$TEMP_DIR"
        cd "$TEMP_DIR"
        git remote add origin "https://github.com/chriswoodle/bump-please-action.git"
        git config credential.helper '!f() { echo "username=x-access-token"; echo "password=${GITHUB_TOKEN}"; }; f'
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git pull origin main

        # Replace action files with the newly built output
        rm -rf dist/
        cp "${GITHUB_WORKSPACE}/action/action.yml" .
        cp -r "${GITHUB_WORKSPACE}/action/dist" .
        cp "${GITHUB_WORKSPACE}/LICENSE" .
        cp "${GITHUB_WORKSPACE}/action/README.md" .

        # Commit and tag with both exact and major versions
        git add -A
        git commit -m "Release ${VERSION}"
        git tag -a "$VERSION" -m "Release ${VERSION}"
        git tag -fa "$MAJOR" -m "Update $MAJOR tag to $VERSION"

        # Push commit and version tags
        git push origin main
        git push origin "$VERSION"
        git push origin "$MAJOR" --force

        # Create a GitHub Release so it appears on the Marketplace
        gh release create "$VERSION" \
          --repo chriswoodle/bump-please-action \
          --title "$VERSION" \
          --notes "See [bump-please $VERSION](https://github.com/chriswoodle/bump-please/releases/tag/$VERSION) for details." \
          --latest
